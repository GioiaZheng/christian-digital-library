<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#173f35">
  <title>在线阅读｜基督教数字图书馆</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body class="reader-body">
  <header class="reader-header">
    <a class="reader-brand" href="index.html">基督教数字图书馆</a>
    <span class="reader-mode">在线阅读</span>
  </header>
  <main class="reader-shell">
    <section class="reader-intro">
      <p class="eyebrow">在线阅读</p>
      <h1 data-reader-title>正在载入书目……</h1>
      <p data-reader-status>正在验证阅读权限并加载页面。</p>
      <div class="reader-toolbar" data-reader-toolbar hidden>
        <div class="reader-toolbar-links">
          <button class="reader-text-button" type="button" data-reader-back>返回上一页</button>
          <a class="reader-text-button" href="index.html" data-reader-detail>书目详情</a>
        </div>
        <form class="reader-page-jump" data-reader-jump>
          <label for="reader-page-number">跳转到</label>
          <input id="reader-page-number" name="page" type="number" min="1" inputmode="numeric" data-reader-page-input>
          <span data-reader-page-total>共 0 页</span>
          <button class="button secondary" type="submit">前往</button>
        </form>
      </div>
    </section>
    <section class="reader-pages" data-reader-pages aria-label="阅读页面"></section>
  </main>
  <script src="assets/access-config.js" defer></script>
  <script src="assets/reader.js" defer></script>
</body>
</html>
